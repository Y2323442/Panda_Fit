name: PandFit
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.5

dependencies:

  flutter:
    sdk: flutter
  http: ^1.3.0
  image_picker: ^1.0.4
  shared_preferences: ^2.5.3
  cupertino_icons: ^1.0.8
  provider: ^6.1.1 
  video_player: ^2.8.0
  flutter_blurhash: ^0.8.2
  intl: ^0.19.0 # 加这一行
  qr_flutter: ^4.1.0
  

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4  # 最新稳定版

# 图标配置（正确写法）
flutter_launcher_icons:
  android: "ic_launcher"
  ios: true
  image_path: "assets/icon.png"
  min_sdk_android: 21

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icon.png
    - assets/videos/

